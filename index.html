<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Avios Boost Calculator — Everyday Points</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal: #086375;
      --gold: #d4af37;
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --good-bg: #e8f5f0;
      --bad-bg: #fef2f2;
      --bad-text: #b91c1c;
      --warn-bg: #fffbeb;
      --warn-border: #fde68a;
      --warn-text: #b45309;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    /* Header */
    .brand-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .brand-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--teal);
    }
    .brand-label {
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--teal);
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 30px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* Gradient rule */
    .rule {
      height: 2px;
      background: linear-gradient(90deg, var(--teal) 0%, var(--gold) 100%);
      border-radius: 2px;
      margin-bottom: 28px;
      opacity: 0.25;
    }

    /* Input */
    .input-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }
    .input-card label {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
      white-space: nowrap;
    }
    .input-card input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 26px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      color: var(--text);
      outline: none;
      min-width: 0;
    }
    .input-card input::placeholder { color: #cbd5e1; }
    .input-card .unit {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }
    .input-card:focus-within {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(8, 99, 117, 0.12);
    }

    /* Section label */
    .section-label {
      font-family: 'Poppins', sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label span {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Cards grid */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }
    @media (max-width: 600px) {
      .cards { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      position: relative;
      overflow: hidden;
    }
    .card.best {
      border-color: var(--teal);
      border-width: 1.5px;
    }
    .card.best::before {
      content: 'Best value';
      position: absolute;
      top: 0;
      right: 0;
      background: var(--teal);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      padding: 4px 12px;
      border-radius: 0 14px 0 10px;
      letter-spacing: .04em;
    }

    .mult-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #f0f9fa;
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 15px;
      color: var(--teal);
      margin-bottom: 14px;
    }

    .card-row {
      margin-bottom: 10px;
    }
    .card-row:last-of-type { margin-bottom: 0; }
    .card-key {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 2px;
    }
    .card-val {
      font-size: 16px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      color: var(--text);
    }
    .card-val.gold { color: var(--gold); }
    .card-val.muted {
      font-size: 13px;
      font-weight: 400;
      font-family: 'Inter', sans-serif;
      color: var(--muted);
    }

    .verdict {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      margin-top: 10px;
    }
    .verdict.good { background: var(--good-bg); color: var(--teal); }
    .verdict.okay { background: #fffbeb; color: #92610a; }
    .verdict.bad { background: var(--bad-bg); color: var(--bad-text); }
    .verdict-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .verdict.good .verdict-dot { background: var(--teal); }
    .verdict.okay .verdict-dot { background: #d4af37; }
    .verdict.bad .verdict-dot { background: var(--bad-text); }

    .warn {
      font-size: 11px;
      color: var(--warn-text);
      background: var(--warn-bg);
      border: 1px solid var(--warn-border);
      border-radius: 8px;
      padding: 8px 10px;
      margin-top: 10px;
      line-height: 1.4;
    }

    /* Divider */
    .divider {
      height: 1.5px;
      background: linear-gradient(90deg, var(--teal) 0%, var(--gold) 100%);
      border-radius: 2px;
      margin-bottom: 28px;
      opacity: 0.15;
    }

    /* Footer note */
    .foot-note {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand-header">
      <div class="brand-dot"></div>
      <span class="brand-label">Everyday Points</span>
    </div>
    <h1>Avios Boost Calculator</h1>
    <p class="sub">See exactly what you get at 1x, 2x, and 3x — no promos, no noise.</p>
    <div class="rule"></div>

    <div class="input-card">
      <label for="avios-in">Your Avios</label>
      <input id="avios-in" type="number" min="0" placeholder="50,000" />
      <span class="unit">pts</span>
    </div>

    <div id="output">
      <div class="empty-state">Enter your Avios above to see boost scenarios</div>
    </div>
  </div>

  <script>
    /******************************************************************
     * CONFIG
     ******************************************************************/
    const BA_MULT = ["1x", "2x", "3x"];

    const QR_BOOST = {
      "1x": { multiplier: 1, cpa: 0.0108 },
      "2x": { multiplier: 2, cpa: 0.0106 },
      "3x": { multiplier: 3, cpa: 0.0104 }
    };

    const GOOD_THRESHOLD = 0.0093;  // < 0.93p = Good deal
    const OKAY_THRESHOLD = 0.01;    // 0.93p–1.00p = Okay deal, > 1.00p = Not worth it

    /******************************************************************
     * Logic helpers
     ******************************************************************/
    function baCPA(boosted, key) {
      return boosted <= 300000
        ? { "1x": 0.0096, "2x": 0.0094, "3x": 0.0092 }[key]
        : 0.0177;
    }

    function fmt(n) {
      return new Intl.NumberFormat("en-GB").format(Math.round(n));
    }

    function fmtGBP(n) {
      return "£" + n.toFixed(2);
    }

    function ppa(cpa) {
      return (cpa * 100).toFixed(3) + "p";
    }

    /******************************************************************
     * Render
     ******************************************************************/
    function buildCards(options, globalBestRank) {
      return '<div class="cards">' + options.map(o => {
        const isBest = o.rank === globalBestRank;
        const verdictClass = o.cpa < GOOD_THRESHOLD ? 'good' : o.cpa < OKAY_THRESHOLD ? 'okay' : 'bad';
        const verdictLabel = o.cpa < GOOD_THRESHOLD ? 'Good deal' : o.cpa < OKAY_THRESHOLD ? 'Okay deal' : 'Not worth it';
        const over300k = o.group === "BA" && o.boosted > 300000;
        return `
          <div class="card${isBest ? ' best' : ''}">
            <div class="mult-badge">${o.key}</div>
            <div class="card-row">
              <div class="card-key">Cost</div>
              <div class="card-val">${fmtGBP(o.cost)}</div>
            </div>
            <div class="card-row">
              <div class="card-key">Boosted Avios</div>
              <div class="card-val">${fmt(o.boosted)}</div>
            </div>
            <div class="card-row">
              <div class="card-key">Total Avios</div>
              <div class="card-val gold">${fmt(o.total)}</div>
            </div>
            <div class="card-row">
              <div class="card-key">Rate</div>
              <div class="card-val muted">${ppa(o.cpa)} per Avios</div>
            </div>
            <div class="verdict ${verdictClass}">
              <span class="verdict-dot"></span>
              ${verdictLabel}
            </div>
            ${over300k ? '<div class="warn">Exceeds 300k threshold — higher rate applies</div>' : ''}
          </div>
        `;
      }).join('') + '</div>';
    }

    function render() {
      const amount = parseInt(document.getElementById('avios-in').value, 10);
      const out = document.getElementById('output');

      if (!amount || amount <= 0) {
        out.innerHTML = '<div class="empty-state">Enter your Avios above to see boost scenarios</div>';
        return;
      }

      // Build BA options
      const baOptions = BA_MULT.map(k => {
        const mult = parseInt(k, 10);
        const boosted = amount * mult;
        const cpa = baCPA(boosted, k);
        const cost = boosted * cpa;
        const total = amount + boosted;
        return { group: "BA", key: k, mult, boosted, cpa, cost, total };
      });

      // Build QR options
      const qrOptions = Object.entries(QR_BOOST).map(([k, d]) => {
        const boosted = amount * d.multiplier;
        const cost = boosted * d.cpa;
        const total = amount + boosted;
        return { group: "QR", key: k, mult: d.multiplier, boosted, cpa: d.cpa, cost, total };
      });

      // Rank across all options combined (lowest cpa = best)
      const all = [...baOptions, ...qrOptions].sort((a, b) => a.cpa - b.cpa);
      all.forEach((o, i) => o.rank = i + 1);
      const bestRank = 1;

      out.innerHTML = `
        <div class="section-label">British Airways <span></span></div>
        ${buildCards(baOptions, bestRank)}
        <div class="divider"></div>
        <div class="section-label">Qatar Airways <span></span></div>
        ${buildCards(qrOptions, bestRank)}
        <p class="foot-note">Good deal = below 0.93p · Okay deal = 0.93p–1.00p · Not worth it = above 1.00p. Best value badge awarded across both airlines combined.</p>
      `;
    }

    document.getElementById('avios-in').addEventListener('input', render);
  </script>
</body>
</html>
